<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>КОМЭКСПО — AI HR-агентство</title>
  <script src="https://telegram.org/js/telegram-web-app.js?60"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <div class="app shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo">КОМЭКСПО</div>
        <div class="sub">AI HR-агентство • найм и HR-автоматизация</div>
      </div>
    </header>

    <main id="screen" class="screen" role="main"></main>

    <nav class="tabs">
      <button class="tab is-active" data-scroll="hero">Главная</button>
      <button class="tab" data-scroll="quiz">Подбор</button>
      <button class="tab" data-scroll="packages">Пакеты</button>
      <button class="tab" data-scroll="cases">Кейсы</button>
      <button class="tab primary" data-scroll="lead">Заявка</button>
    </nav>

    <footer class="footer">
      <div class="contact-stack">
        <a class="contact-line" href="https://komexspo.ru/" target="_blank">Сайт: komexspo.ru</a>
        <a class="contact-line phone" href="tel:+79301225589">+7 930 122-55-89</a>
      </div>
    </footer>
  </div>

  <button class="qr-fab" id="qrFab" type="button" aria-label="Открыть QR-код сайта">
    <span class="qr-fab__label">QR</span>
  </button>

  <div class="qr-popover" id="qrPopover" hidden>
    <button class="qr-popover__close" id="qrClose">×</button>
    <div class="qr-popover__title">Открыть сайт KomExspo</div>

    <a class="qr-popover__link" href="https://komexspo.ru/" target="_blank">
      komexspo.ru
    </a>

    <img class="qr-popover__image"
         src="{{ url_for('static', filename='img/komexspo-qr.png') }}"
         alt="QR-код сайта KomExspo" />

    <div class="qr-popover__hint">
      Наведите камеру или нажмите
    </div>
  </div>

  <script defer src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
