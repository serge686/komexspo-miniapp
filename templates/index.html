<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>КОМЭКСПО — AI HR-агентство</title>

  <!-- Telegram Mini Apps API -->
  <script src="https://telegram.org/js/telegram-web-app.js?60"></script>

  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>

<body>
  <div class="bg" aria-hidden="true"></div>

  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">КОМЭКСПО</div>
        <div class="sub">AI HR-агентство • найм и HR-автоматизация</div>
      </div>

      <!-- кнопка назад -->
      <button class="iconbtn" id="btnBack" type="button" aria-label="Назад">←</button>
    </header>

    <!-- сюда рисует app.js -->
    <main id="screen" class="screen" role="main"></main>

    <!-- ✅ Квиз убран. ✅ 4 ровные кнопки -->
    <nav class="tabs" aria-label="Навигация">
      <button class="tab" data-go="home" type="button">Главная</button>
      <button class="tab" data-go="packages" type="button">Пакеты</button>
      <button class="tab" data-go="cases" type="button">Кейсы</button>
      <button class="tab primary" data-go="lead" type="button">Заявка</button>
    </nav>

    <footer class="footer">
      <div class="hint">© KomExpo • Mini App</div>
    </footer>
  </div>

  <script defer src="{{ url_for('static', filename='app.js') }}"></script>
</body>
