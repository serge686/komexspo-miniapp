<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>КОМЭКСПО — AI HR-агентство</title>
  <script src="https://telegram.org/js/telegram-web-app.js?60"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <div class="app-shell">
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="logo">КОМЭКСПО</div>
          <div class="sub">Telegram Mini App • AI HR-агентство</div>
        </div>

        <button id="btnBack" class="iconbtn" type="button" aria-label="Назад">←</button>
      </header>

      <main id="screen" class="screen" role="main"></main>

      <nav class="tabs" aria-label="Навигация">
        <button class="tab" data-go="home" type="button">Главная</button>
        <button class="tab" data-go="quiz" type="button">Подбор</button>
        <button class="tab" data-go="packages" type="button">Пакеты</button>
        <button class="tab" data-go="cases" type="button">Кейсы</button>
        <button class="tab primary" data-go="lead" type="button">Заявка</button>
      </nav>

      <footer class="contacts-bar">
        <span>Telegram: <a href="https://t.me/komexpo" target="_blank" rel="noreferrer">@komexpo</a></span>
        <span>+7 900 000-00-00</span>
      </footer>
    </div>
  </div>

  <button class="quality-badge quality-badge-btn" id="qualityBadge" type="button" aria-label="Проверено GetCourse">
    <img src="{{ url_for('static', filename='img/getcourse-badge.svg') }}" alt="Проверено GetCourse" />
  </button>

  <script defer src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
