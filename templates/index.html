<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>КОМЭКСПО • AI HR-агентство</title>
  <meta name="theme-color" content="#eef2ff">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button id="btnBack" class="icon-btn" type="button" aria-label="Назад">←</button>
      <div class="topbar__brand">
        <span class="topbar__eyebrow">Telegram Mini App</span>
        <strong>КОМЭКСПО • AI HR-агентство</strong>
      </div>
      <button id="btnMenu" class="icon-btn" type="button" aria-label="Меню">☰</button>
    </header>

    <main id="screen" class="screen" aria-live="polite"></main>

    <nav class="bottom-nav" id="bottomNav">
      <button class="nav-btn is-active" data-page="home" type="button">Главная</button>
      <button class="nav-btn" data-page="quiz" type="button">Подбор</button>
      <button class="nav-btn" data-page="services" type="button">Пакеты</button>
      <button class="nav-btn" data-page="cases" type="button">Кейсы</button>
      <button class="nav-btn nav-btn--accent" data-page="lead" type="button">Заявка</button>
    </nav>
  </div>

  <script>
    window.APP_CONFIG = {
      policyUrl: {{ policy_url|tojson }}
    };
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
