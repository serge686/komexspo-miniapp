<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>КОМЭКСПО — AI HR-агентство</title>
  <script src="https://telegram.org/js/telegram-web-app.js?60"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <div class="app shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo">КОМЭКСПО</div>
        <div class="sub">AI HR-агентство • найм и HR-автоматизация</div>
      </div>
    </header>

    <main id="screen" class="screen" role="main"></main>

    <nav class="tabs" aria-label="Навигация">
      <button class="tab is-active" data-scroll="hero" type="button">Главная</button>
      <button class="tab" data-scroll="quiz" type="button">Подбор</button>
      <button class="tab" data-scroll="packages" type="button">Пакеты</button>
      <button class="tab" data-scroll="cases" type="button">Кейсы</button>
      <button class="tab primary" data-scroll="lead" type="button">Заявка</button>
    </nav>

    <footer class="footer">
      <div class="contact-stack">
        <a class="contact-line" href="https://t.me/komexpo" target="_blank" rel="noreferrer">Telegram: @komexpo</a>
        <a class="contact-line phone" href="tel:+79000000000">+7 900 000-00-00</a>
      </div>
    </footer>
  </div>

  <button class="qr-fab" id="qrFab" type="button" aria-label="Открыть QR-код Telegram">
    <span class="qr-fab__label">QR</span>
  </button>

  <div class="qr-popover" id="qrPopover" hidden>
    <button class="qr-popover__close" id="qrClose" type="button" aria-label="Закрыть">×</button>
    <div class="qr-popover__title">Связаться в Telegram</div>
    <a class="qr-popover__link" href="https://t.me/komexpo" target="_blank" rel="noreferrer">@komexpo</a>
    <img class="qr-popover__image" src="{{ url_for('static', filename='img/komexpo-qr.png') }}" alt="QR-код Telegram KomExpo" />
    <div class="qr-popover__hint">Наведите камеру или нажмите на ссылку</div>
  </div>

  <script defer src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
